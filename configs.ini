[LLM]
MAIN_MODEL = llama-3.3-70b-versatile
MAX_TOKENS = 300
TEMPERATURE = 0
FALLBACK_MODEL = llama-3.1-8b-instant
ROUTER_MODEL = llama-3.1-8b-instant
ROUTER_MAX_TOKENS = 120
ROUTER_TEMPERATURE = 0
RESEARCH_TEMPERATURE = 0.2
RESEARCH_MAX_TOKENS = 1000
TOOL_USE_MODEL = llama-3.3-70b-versatile


[SAFETY]
ENABLE_TIER2 = false

[LOGGING]
ENABLE_LOGGING = true

[MEMORY]
EMBEDDING_MODEL = all-MiniLM-L6-v2
ENABLE_MEMORY = true
REDIS_HOST = localhost
REDIS_PORT = 6379
REDIS_TTL_SECONDS = 3600
VECTOR_STORE_PATH = ./vector_store
HISTORY_TURNS = 8
SIMILARITY_THRESHOLD = 0.90     
TOPIC_CHANGE_THRESHOLD = 0.3 
MIN_RESPONSE_LENGTH = 100

[TOOLS]
ENABLE_WEB_SEARCH = true

[COST]
COST_PER_1K_TOKENS_MAIN = 0.0009
COST_PER_1K_TOKENS_FALLBACK = 0.0001
COST_PER_1K_TOKENS_ROUTER = 0.0001

[ROUTING]
MIN_CONFIDENCE_THRESHOLD = 0.5